name: Tydeflow Daily Scanner

on:
  schedule:
    # 4:35 PM ET on US market days (Mon–Fri) = 21:35 UTC
    - cron: "35 21 * * 1-5"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

permissions:
  contents: write # needed to commit last_signals.json state file

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run Tydeflow scanner
        working-directory: scanner
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SIGNALS_SHEET_ID: ${{ secrets.SIGNALS_SHEET_ID }}
        run: python scanner.py

      - name: Commit signal state
        run: |
          git config user.name  "Tydeflow Scanner"
          git config user.email "scanner@tydeflow.app"
          git add scanner/last_signals.json
          git diff --staged --quiet && echo "No state changes" || \
            git commit -m "chore: scanner state update [skip ci]" && git push
